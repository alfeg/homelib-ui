services:
  torrserve:
    image: ghcr.io/yourok/torrserver:latest
    restart: unless-stopped
    ports:
      - "8090"
    volumes:
      - torrserve_data:/opt/torrserver

  myhomelib:
    build: .
    restart: unless-stopped
    ports:
      - "4321:8080"
    environment:
      Library__MagnetUri: "magnet:?xt=urn:btih:8beb62f8e5db5ebe96d6864d138320425fea81c7&dn=_Lib.rus.ec%20-%20%D0%9E%D1%84%D0%B8%D1%86%D0%B8%D0%B0%D0%BB%D1%8C%D0%BD%D0%B0%D1%8F&xl=424974004355&tr=http%3A%2F%2Ftr.ysagin.top%2Fannounce&tr=udp%3A%2F%2Ftr3.ysagin.top%3A2715%2Fannounce&tr=udp%3A%2F%2Fopen.stealth.si%3A80%2Fannounce&tr=udp%3A%2F%2Ftracker.torrent.eu.org%3A451%2Fannounce"
      Library__DownloadsDirectory: /data/books
      Library__DuckDbMemoryLimitMb: 32
      Torrent__TorrServeUrl: http://torrserve:8090
      Performance__DisconnectedCircuitMaxRetained: 10
      Performance__DisconnectedCircuitRetentionSeconds: 60
      DOTNET_gcServer: 0
      DOTNET_GCHeapHardLimitPercent: 60
      DOTNET_GCConserveMemory: 9
    volumes:
      - books_data:/data/books
    depends_on:
      - torrserve

volumes:
  torrserve_data:
  books_data:
